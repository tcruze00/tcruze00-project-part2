<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Project 1 Requirement: Responsive Meta Tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Website</title>

    <!-- Project 1 Requirement: External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Tutorial 9 Requirement: JavaScript File -->
    <script src="script.js" defer></script>
</head>

<body onload="showAlert(); showDateTime(); startCountdown();">

<!-- Project 1 Requirement: Navigation -->
<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</nav>

<!-- ================= HOME SECTION ================= -->
<section id="home">

    <!-- Project 1 Requirement: Header -->
    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <p>This is the home section.</p>

</section>

<!-- ================= ABOUT SECTION ================= -->
<section id="about">

    <h2>About</h2>

    <!-- Project 1 Requirement: Content Section -->
    <p>This is the about section of the website.</p>

</section>

<!-- ================= CONTACT SECTION (TUTORIAL 7 FORM) ================= -->
<section id="contact">

<h2>Contact Form</h2>

<!-- Tutorial 9 Requirement: Current Date and Time -->
<p id="datetime"></p>

<!-- Tutorial 9 Requirement: Countdown -->
<p id="countdown"></p>

<form>

    <!-- Tutorial 7 Requirement: Multiple Fieldsets -->
    <fieldset>
        <legend>Personal Information</legend>

        <!-- Tutorial 7 Requirement: Text Input + Validation -->
        <label>Name:</label>
        <input type="text"
               required
               minlength="3"
               maxlength="20"
               pattern="[A-Za-z ]+">

        <br><br>

        <!-- Tutorial 7 Requirement: Email (Mobile Keyboard Type) -->
        <label>Email:</label>
        <input type="email" required>

        <br><br>

        <!-- Tutorial 7 Requirement: Date Input -->
        <label>Date:</label>
        <input type="date">

        <br><br>

        <!-- Tutorial 7 Requirement: Time Input -->
        <label>Time:</label>
        <input type="time">

    </fieldset>

    <fieldset>

        <!-- Tutorial 7 Requirement: Radio Buttons -->
        <p>Favorite Color:</p>
        <input type="radio" name="color" required> Red
        <input type="radio" name="color"> Blue
        <input type="radio" name="color"> Green

        <br><br>

        <!-- Tutorial 7 Requirement: Checkboxes -->
        <p>Hobbies:</p>
        <input type="checkbox"> Music
        <input type="checkbox"> Sports
        <input type="checkbox"> Gaming

        <br><br>

        <!-- Tutorial 7 Requirement: Spinner -->
        Quantity:
        <input type="number" min="1" max="10">

        <br><br>

        <!-- Tutorial 7 Requirement: Range Slider -->
        Satisfaction:
        <input type="range" min="0" max="100">

        <br><br>

        <!-- Tutorial 7 Requirement: Selection List -->
        Country:
        <select>
            <option>USA</option>
            <option>Canada</option>
            <option>Mexico</option>
        </select>

        <br><br>

        <!-- Tutorial 7 Requirement: Datalist -->
        Browser:
        <input list="browsers">

        <datalist id="browsers">
            <option value="Chrome">
            <option value="Firefox">
            <option value="Edge">
        </datalist>

        <br><br>

        <!-- Tutorial 7 Requirement: Textarea -->
        Comments:
        <textarea rows="5" cols="30"></textarea>

    </fieldset>

    <!-- Tutorial 7 Requirement: Submit Button -->
    <input type="submit" value="Submit">

    <!-- Tutorial 7 Requirement: Reset Button -->
    <input type="reset" value="Reset">

</form>

</section>

</body>
</html>
